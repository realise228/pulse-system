<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PULSE</title>
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
<div class="container" id="app">
<div id="loginScreen" class="login-screen">
<div class="login-card">
<div class="logo"><h1>PULSE</h1><p>Enterprise Platform</p></div>
<div class="input-group"><label>Email</label><input type="email" id="email" value="director@pulse.local"></div>
<div class="input-group"><label>Password</label><input type="password" id="password" value="password123"></div>
<button onclick="auth.login()" class="btn-primary">Sign In</button>
<div class="demo-accounts"><p>Demo accounts</p>
<button onclick="auth.fillAndLogin('director@pulse.local')" class="btn-demo">Director</button>
<button onclick="auth.fillAndLogin('manager@pulse.local')" class="btn-demo">Manager</button>
<button onclick="auth.fillAndLogin('employee@pulse.local')" class="btn-demo">Employee</button>
</div></div></div>

<div id="mainApp" class="main-app" style="display:none">
<nav class="sidebar">
<div class="sidebar-logo">PULSE</div>
<ul class="nav-menu">
<li class="nav-item active" data-tab="dashboard"><span>⌂</span> Dashboard</li>
<li class="nav-item" data-tab="employees"><span>☰</span> Employees</li>
<li class="nav-item" data-tab="chats"><span>◈</span> Chats</li>
<li class="nav-item" data-tab="analytics"><span>⬡</span> Analytics</li>
<li class="nav-item" data-tab="crm"><span>⌬</span> CRM 1C</li>
<li class="nav-item" data-tab="infobanks"><span>▣</span> Knowledge Base</li>

</ul>
<div class="sidebar-footer">
<div class="user-info"><div class="user-avatar" id="userAvatar"></div><div class="user-details"><span id="userName"></span><span id="userRole"></span></div></div>
<div style="font-size:9px;color:#555;letter-spacing:2px;margin-bottom:8px">Online: <span id="onlineCount">0</span></div>
<button onclick="auth.logout()" class="btn-logout">Logout</button>
</div></nav>

<main class="content">
<div id="dashboard" class="tab-content active"></div>
<div id="employees" class="tab-content"></div>
<div id="chats" class="tab-content"></div>
<div id="analytics" class="tab-content"></div>
<div id="crm" class="tab-content"></div>
<div id="infobanks" class="tab-content"></div>
<div id="files" class="tab-content"></div>
</main></div></div>

<div id="modal" class="modal" onclick="if(event.target===this)app.closeModal()"><div class="modal-content" id="modalContent"></div></div>

<script src="/js/emp.js"></script>
<script src="/js/knowledge.js"></script>
<script src="/js/chats.js"></script>
<script src="/js/analytics.js"></script>
<script src="/js/crm.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
