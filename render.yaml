services:
  - type: web
    name: pulse-system
    env: node
    buildCommand: |
      npm install
      npx prisma generate
      npm run build
    startCommand: |
      npx prisma migrate deploy
      npx ts-node prisma/seed.ts
      node dist/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: DATABASE_URL
        fromDatabase:
          name: pulse-db
          property: connectionString

databases:
  - name: pulse-db
    databaseName: pulse
    user: pulse_user
